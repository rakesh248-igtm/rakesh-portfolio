<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rakesh Dama — Contact</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #151820; --card: #1c2030;
      --border: #2a2f42; --accent: #4f8ef7; --accent2: #7c5cfc;
      --text: #e8eaf2; --muted: #7a7f96; --link: #4f8ef7;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── LAYOUT SHELL ── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── HEADER — flex-shrink:0, never moves ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      z-index: 100;
    }
    .row { width: 100%; display: flex; align-items: center; gap: 16px; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text); flex: 1; text-align: center; }
    #detButton { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 10px; background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.25); transition: background .2s, border-color .2s, transform .15s; flex-shrink: 0; }
    #detButton:hover { background: rgba(79,142,247,.22); border-color: var(--accent); transform: translateY(-1px); }
    #detButton svg { width: 18px; height: 18px; }

    /* ── MAIN — flex:1 + overflow:hidden so footer never moves ── */
    .content-section {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── scroll-inner — ONLY this scrolls when viewport shrinks ── */
    .contact-container {
      width: 100%;
      max-width: 480px;
      max-height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

    /* ── CARD ── */
    .contact-box { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; position: relative; overflow: hidden; }
    .contact-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
    .avatar { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:800; color:#fff; margin-bottom:18px; letter-spacing:-0.02em; }
    .contact-box h3 { font-family:'Syne',sans-serif; font-size:1.55rem; font-weight:800; color:var(--text); margin-bottom:4px; letter-spacing:-0.01em; }
    .role-badge { display:inline-block; font-size:0.72rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); background:rgba(79,142,247,.12); border:1px solid rgba(79,142,247,.2); border-radius:20px; padding:3px 10px; margin-bottom:28px; }

    /* ── CONTACT ROWS ── */
    .contact-list { display:flex; flex-direction:column; gap:6px; }
    .contact-row { display:flex; align-items:center; gap:14px; padding:12px 14px; border-radius:12px; border:1px solid transparent; transition:background .2s,border-color .2s; text-decoration:none; color:inherit; }
    .contact-row:hover { background:rgba(255,255,255,.04); border-color:var(--border); }
    .icon-wrap { width:38px; height:38px; border-radius:10px; background:rgba(79,142,247,.1); border:1px solid rgba(79,142,247,.18); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
    .contact-row:hover .icon-wrap { background:rgba(79,142,247,.2); }
    .icon-wrap svg { width:16px; height:16px; fill:var(--accent); }
    .contact-info { display:flex; flex-direction:column; }
    .contact-label { font-size:0.68rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:1px; }
    .contact-value { font-size:0.9rem; font-weight:400; color:var(--text); }
    a.contact-row .contact-value { color:var(--link); }

    /* ── FOOTER — flex-shrink:0, never moves ── */
    footer { text-align:center; padding:14px; font-size:0.75rem; color:var(--muted); border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; letter-spacing:0.04em; }
  </style>
</head>
